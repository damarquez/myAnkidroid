<!--
    Pleco and HSK links to entry
 -->
<div id="compact-links" style="font-family: Arial; font-size: 16px;">
    <a id="pleco-link" href="plecoapi://x-callback-url/s?q={{url:Front}}">Pleco</a>
    | <a id="hsk-link" href="https://hskhsk.pythonanywhere.com/cidian?q={{url:Front}}">HSK</a>
    | <a href="https://hanpingchinese.com/cmn/word?t={{url:Front}}">Hanping</a>
</div>
<span id="ac-front-content" style="display:none;">{{Front}}</span>

<!--
   Link to ArchChinese when single character
-->
<script>
    try {
      var frontContentSpan = document.getElementById('ac-front-content');
      var frontText = frontContentSpan.textContent || frontContentSpan.innerText;
      var trimmedContent = frontText.trim();

      var plecoLink = document.getElementById('pleco-link');
      var hskLink = document.getElementById('hsk-link');
      var wordForPlecoHsk = trimmedContent;

      if (trimmedContent.length === 2 && trimmedContent.endsWith('.')) {
        wordForPlecoHsk = trimmedContent.slice(0, 1);
      }

      if (plecoLink) {
        plecoLink.href = "plecoapi://x-callback-url/s?q=" + encodeURIComponent(wordForPlecoHsk);
      }
      if (hskLink) {
        hskLink.href = "https://hskhsk.pythonanywhere.com/cidian?q=" + encodeURIComponent(wordForPlecoHsk);
      }

      var charForUrl = trimmedContent;
      if (charForUrl.endsWith('.')) {
        charForUrl = charForUrl.slice(0, -1);
      }

      var linksContainer = document.getElementById('compact-links');
      if (linksContainer && charForUrl.length === 1) {
        var archChineseUrl = "https://www.archchinese.com/chinese_english_dictionary.html?find=" + encodeURIComponent(charForUrl);
        var hanziDbUrl = "http://hanzidb.org/character/" + encodeURIComponent(charForUrl);
        linksContainer.innerHTML += ' | <a href="' + archChineseUrl + '">ArchChinese</a>';
        linksContainer.innerHTML += ' | <a href="' + hanziDbUrl + '">hanziDB</a>';
      }
    } catch (e) {}
</script>

<script>
    window.getLastTextNodeDeep = function (node) {
        if (!node) return null;

        if (node.nodeType === Node.TEXT_NODE) {
            return node;
        }

        for (let i = node.childNodes.length - 1; i >= 0; i--) {
            const found = window.getLastTextNodeDeep(node.childNodes[i]);
            if (found) return found;
        }

        return null;
    };

    window.getHiddenMarkerInfo = function (lineEl) {
        if (!lineEl) return null;

        const text = (lineEl.textContent || '').replace(/\u00A0/g, ' ').trim();

        if (/\(\*\)\s*$/.test(text)) {
            return { marker: '(*)', alt: '' };
        }
        if (/\(\*1\)\s*$/.test(text)) {
            return { marker: '(*1)', alt: 'Mandarin' };
        }
        if (/\(\*2\)\s*$/.test(text)) {
            return { marker: '(*2)', alt: 'Pinyin' };
        }
        if (/\(\*3\)\s*$/.test(text)) {
            return { marker: '(*3)', alt: 'Translation' };
        }

        return null;
    };

    window.removeHiddenMarkerFromLine = function (lineEl, marker) {
        if (!lineEl || !marker) return;

        const escapedMarker = marker.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const lastTextNode = window.getLastTextNodeDeep(lineEl);
        if (!lastTextNode) return;

        lastTextNode.textContent = lastTextNode.textContent.replace(
            new RegExp('\\s*' + escapedMarker + '\\s*$'),
            ''
        );
    };

    window.makeLineToggleable = function (lineEl, altText) {
        const wrapper = document.createElement('div');
        wrapper.className = 'hidden-line-wrapper';

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'hidden-line-toggle';
        btn.textContent = '+';

        const content = document.createElement('div');
        content.className = 'hidden-line-content is-hidden';

        if (altText) {
            content.classList.add('has-alt');
        }

        while (lineEl.firstChild) {
            content.appendChild(lineEl.firstChild);
        }

        if (altText) {
            const altSpan = document.createElement('span');
            altSpan.className = 'hidden-line-alt';
            altSpan.textContent = altText;
            content.appendChild(altSpan);
        }

        btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();

            const hidden = content.classList.contains('is-hidden');
            if (hidden) {
                content.classList.remove('is-hidden');
                content.classList.add('is-revealed');
                btn.textContent = '-';
            } else {
                content.classList.remove('is-revealed');
                content.classList.add('is-hidden');
                btn.textContent = '+';
            }
        });

        wrapper.appendChild(btn);
        wrapper.appendChild(content);
        return wrapper;
    };

    window.applyHiddenLineToggles = function (target) {
        if (!target || target.dataset.hiddenLinesProcessed === '1') return;

        const originalNodes = Array.from(target.childNodes);
        const rebuilt = document.createDocumentFragment();
        let currentLine = document.createElement('div');

        function flushCurrentLine() {
            const hasContent = currentLine.childNodes.length > 0;
            if (!hasContent) return;

            const info = window.getHiddenMarkerInfo(currentLine);

            if (info) {
                window.removeHiddenMarkerFromLine(currentLine, info.marker);
                rebuilt.appendChild(window.makeLineToggleable(currentLine, info.alt));
            } else {
                while (currentLine.firstChild) {
                    rebuilt.appendChild(currentLine.firstChild);
                }
            }

            currentLine = document.createElement('div');
        }

        originalNodes.forEach(node => {
            if (node.nodeName === 'BR') {
                flushCurrentLine();
                rebuilt.appendChild(document.createElement('br'));
            } else {
                currentLine.appendChild(node);
            }
        });

        flushCurrentLine();

        target.innerHTML = '';
        target.appendChild(rebuilt);
        target.dataset.hiddenLinesProcessed = '1';
    };
</script>
